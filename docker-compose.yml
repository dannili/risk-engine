services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: risk_engine
      POSTGRES_USER: risk_engine
      POSTGRES_PASSWORD: risk_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risk_engine"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: risk_engine
      POSTGRES_USER: risk_engine
      POSTGRES_PASSWORD: risk_engine
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: risk_engine
      POSTGRES_USER: risk_engine
      POSTGRES_PASSWORD: risk_engine
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
